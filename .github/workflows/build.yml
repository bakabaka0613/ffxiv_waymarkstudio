name: Build v0.0.0.35
on: workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout Tag
        uses: actions/checkout@v4
        with:
          ref: 'v0.0.0.35' # 關鍵：這行會讓它略過主分支，直接抓 0.35 的代碼

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build
        run: |
          dotnet restore
          dotnet build --configuration Release
          
      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: WaymarkStudio-v0.0.0.35
          path: "**/bin/Release/**"
