name: Build WaymarkStudio for CN/TW (v0.0.0.35)

on: 
  workflow_dispatch: 

jobs:
  Build:
    runs-on: ubuntu-latest
    env:
        DALAMUD_HOME: /tmp/dalamud
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          ref: 'v0.0.0.35'
          submodules: true

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'
          
      - name: Install 7z
        run: sudo apt-get install -y p7zip-full

      - name: Download Yanmu Dalamud (CN/TW Latest)
        run: |
          mkdir -p ${{ env.DALAMUD_HOME }}
          # 解析最新的 .7z 下載連結
          DOWNLOAD_URL=$(curl -s https://api.github.com/repos/yanmucorp/Dalamud/releases/latest | grep "browser_download_url" | grep ".7z" | cut -d '"' -f 4)
          echo "Downloading from: $DOWNLOAD_URL"
          curl -L $DOWNLOAD_URL -o ${{ env.DALAMUD_HOME }}.7z
          
          # 使用 7z 進行解壓
          7z x ${{ env.DALAMUD_HOME }}.7z -o${{ env.DALAMUD_HOME }}

      - name: Restore Project
        run: dotnet restore

      - name: Build Project
        run: |
          # 編譯並指向下載好的 Dalamud DLL
          dotnet build --configuration Release WaymarkStudio/WaymarkStudio.csproj \
            -p:DalamudLibPath=${{ env.DALAMUD_HOME }} \
            -p:AssemblyVersion=0.0.0.35

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WaymarkStudio-v0.0.0.35-CN-TW
          path: WaymarkStudio/bin/Release/WaymarkStudio/
